apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-ops-toolkit
  labels:
    app: network-ops-toolkit
spec:
  replicas: 1
  selector:
    matchLabels:
      app: network-ops-toolkit
  template:
    metadata:
      labels:
        app: network-ops-toolkit
    spec:
      containers:
        - name: app
          image: network-ops-toolkit:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: TZ
              value: Asia/Shanghai
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: data
              mountPath: /app/app/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: network-ops-toolkit
  labels:
    app: network-ops-toolkit
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: network-ops-toolkit
